<!-- Desktop bundle -->

<script>

(() => {
  // Desktop-only guard: prevent this script from running on mobile

  // Squarespace guard: never run inside /config (admin), editor preview iframe, or edit mode.
  // Emergency kill-switch: add ?nooverride=1 to the page URL.
  const __qs = new URLSearchParams(window.location.search);
  const __isAdmin = window.location.pathname.startsWith("/config");
  const __isInIframe = (window.self !== window.top);
  const __isEditMode = document.body.classList.contains("sqs-edit-mode") || document.documentElement.classList.contains("sqs-edit-mode");
  if (__isAdmin || __isEditMode || __qs.has("nooverride")) return;


  const ABOUT_URL = "https://about.enricopoli.com";

  // ==========================
  // Assets (GitHub raw)
  // ==========================
  const RAW_ENRICO = (p) => `assets/epoli_walk/${p}`;
  const RAW_BG     = (p) => `assets/landscapes/${p}`;

  const ASSETS = {
    enrico: {
      idle: RAW_ENRICO("enrico_idle.webp"),
      walk: [
        RAW_ENRICO("enrico_walk_01.webp"),
        RAW_ENRICO("enrico_walk_02.webp"),
        RAW_ENRICO("enrico_walk_03.webp"),
        RAW_ENRICO("enrico_walk_04.webp"),
        RAW_ENRICO("enrico_walk_05.webp"),
        RAW_ENRICO("enrico_walk_06.webp"),
        RAW_ENRICO("enrico_walk_07.webp"),
        RAW_ENRICO("enrico_walk_08.webp"),
        RAW_ENRICO("enrico_walk_09.webp"),
        RAW_ENRICO("enrico_walk_10.webp"),
        RAW_ENRICO("enrico_walk_11.webp"),
        RAW_ENRICO("enrico_walk_12.webp"),
      ],
    },
    screens: [
      { id: "bologna_01",   url: RAW_BG("bologna_01.webp") },
      { id: "pitch_bg_01",  url: RAW_BG("pitch_bg_01.webp") },
      { id: "milan_01",     url: RAW_BG("milan_01.webp") },
      { id: "venice_01",    url: RAW_BG("venice_01.webp") },
      { id: "london_01",    url: RAW_BG("london_01.webp") },
      { id: "new_york_01",  url: RAW_BG("new_york_01.webp") },
    ]};

  // ==========================
  // Story content (per screen)
  // ==========================
  const STORY = {
    bologna_01: `Hi, I'm Enrico Poli.

I was born in Bologna, Italy on the 17th of March 1987. I studied at Liceo Scientifico Enrico Fermi.

Somewhere between homework and long walks home, it became clear I was stubborn and determined (and yes - I also started cultivating a mild, poetic hatred for my hometown... which later turned into a very practical desire to escape.)`,

    pitch_bg_01: `My escape from Bologna was... delayed.

I spent years playing football in youth teams. In 2006 I finally rationalized that I wasn't going to pursue a professional career.

So I started asking a scary question: what else can I do with my life?`,

    milan_01: `I got into the Communication Design BA at Politecnico di Milano. I was selected as 132nd out of 135 places — a near miss with paperwork.

I loved it at first... then I developed a dread for design and Milan (it was becoming obvious the common denominator was... me.)

Anyway, I was ready to quit and move to South America - but an encounter pointed me elsewhere.`,

    venice_01: `I moved to Venice for a BA in Production and Design of Visual Arts. The course was intensely philosophical and almost allergic to pragmatism. I hated it quickly.

I also hated that beautiful secluded island, permeated by the world only during Carnival and the Biennale. Yes, I know - I'm seeing a pattern too.

Chances are... I was lucky. There were two filmmaking courses. And somewhere between boredom and stubborness, I discovered something I loved.`,

    london_01: `To finish my studies I needed an internship, so in 2011 I moved to London to work in a production company. And there I stayed for 8 years.

I worked extensively as an editor and creative freelancer, with agencies like Droga5, JWT, Ogilvy, Saatchi & Saatchi, and many others...

Meanwhile, I kept chasing my dream to make films: writing features, making shorts, and gradually getting hired to shoot commercials and music videos.`,

    new_york_01: `The next “obvious” move seemed to be New York - a city I’d dreamed about all my life.

And so it was that in 2019... plot twist! I didn't move to New York. I moved back to Bologna, my dreaded hometown! Why? Why, you may ask... Well... if you do find out, please do let me know...

But anyway... in spite of some stumbles, the work kept expanding. I continued directing commercials and branded content, then grew into concept development across industries - and lately into Experience Design!

Same stubborness, do not doubt. Even worse, actually, cause I'm significantly older.`
  };

  const storyProgress = Object.create(null);
  let storyTimer = null;

  function setStoryText(txt, caret) { storyPre.textContent = caret ? (txt + "▌") : txt; }
  function stopStoryTimer() { if (storyTimer) { clearInterval(storyTimer); storyTimer = null; } }

  function startTypingForScreen(screenId) {
    if (!STORY[screenId]) { setStoryText("", false); return; }

    if (!storyProgress[screenId]) storyProgress[screenId] = { i: 0, done: false };
    const prog = storyProgress[screenId];

    if (prog.done) { stopStoryTimer(); setStoryText(STORY[screenId], false); return; }

    stopStoryTimer();
    setStoryText(STORY[screenId].slice(0, prog.i), true);

    const speedMs = 18;
    storyTimer = setInterval(() => {
      prog.i += 1;
      if (prog.i >= STORY[screenId].length) {
        prog.i = STORY[screenId].length;
        prog.done = true;
        stopStoryTimer();
        setStoryText(STORY[screenId], false);
        return;
      }
      setStoryText(STORY[screenId].slice(0, prog.i), true);
    }, speedMs);
  }

  // ==========================
  // Fullscreen mount (Squarespace-safe)
  // ==========================
  const mount = document.createElement("div");
  mount.id = "enrico-walk-fullscreen";
  mount.style.cssText = `
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;

    /* ABSOLUTE SOLID: keep the experience above any Squarespace overlays */
    z-index: 2147480000;

    background: #000;
    background-image: url('${ASSETS.screens[0].url}');
    background-size: cover;
    background-position: center;
    background-repeat: no-repeat;
    overflow: hidden;
    pointer-events: auto;
  `;
  document.body.appendChild(mount);

  // Ensure Squarespace header stays on top (if present)
  (function liftSquarespaceHeader(){
    const headerEls = [
      document.querySelector("header"),
      document.querySelector(".Header"),
      document.querySelector("#header"),
      document.querySelector(".header"),
      document.querySelector(".Header-branding"),
      document.querySelector(".Header-inner"),
    ].filter(Boolean);

    for (const el of headerEls) {
      try {
        const cs = getComputedStyle(el);
        if (cs.position === "static") el.style.position = "relative";
        el.style.zIndex = "2147482000";
      } catch(_) {}
    }

    const style = document.createElement("style");
    style.textContent = `
      header, .Header, #header, .header {
        position: relative !important;
        z-index: 2147482000 !important;
      }
    `;
    document.head.appendChild(style);
  })();

  const prevOverflow = document.documentElement.style.overflow;
  document.documentElement.style.overflow = "hidden";

  const canvas = document.createElement("canvas");
  /* IMPORTANT: don't let Safari hit-test the canvas; we handle interaction at document level */
  canvas.style.cssText = "position:absolute; inset:0; width:100%; height:100%; display:block; pointer-events:none;";
  mount.appendChild(canvas);

  // Loading overlay (animated + progress so it never looks "stuck")
  const loadingOverlay = document.createElement("div");
  loadingOverlay.style.cssText = `
    position: absolute;
    inset: 0;
    display: grid;
    place-items: center;
    background: rgba(0,0,0,0.22);
    backdrop-filter: blur(2px);
    -webkit-backdrop-filter: blur(2px);
    color: rgba(255, 236, 180, 0.90);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 13px;
    letter-spacing: 0.6px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.55);
    z-index: 2147480100;
    pointer-events: none;
  `;

  // Loader markup
  loadingOverlay.innerHTML = `
    <div class="ep-load-wrap">
      <div class="ep-load-line">
        <span id="epLoadLabel">LOADING</span>
        <span class="ep-load-dots" aria-hidden="true"><i></i><i></i><i></i></span>
      </div>
      <div class="ep-load-bar"><span id="epLoadFill"></span></div>
    </div>
  `;
  mount.appendChild(loadingOverlay);

  // Loader styles (scoped)
  (function injectLoaderStyle(){
    if (document.getElementById("epLoaderStyle")) return;
    const st = document.createElement("style");
    st.id = "epLoaderStyle";
    st.textContent = `
      .ep-load-wrap{ width:min(420px, calc(100vw - 48px)); display:flex; flex-direction:column; gap:10px; align-items:center; }
      .ep-load-line{ display:flex; gap:10px; align-items:center; justify-content:center; }
      .ep-load-dots{ display:inline-flex; gap:6px; align-items:center; }
      .ep-load-dots i{ width:7px; height:7px; border-radius:999px; background: rgba(255,236,180,0.85); opacity:0.2; transform: scale(0.75); animation: epDot 1.05s infinite ease-in-out; }
      .ep-load-dots i:nth-child(2){ animation-delay: .15s; }
      .ep-load-dots i:nth-child(3){ animation-delay: .30s; }
      @keyframes epDot{ 0%,80%,100%{ opacity:.18; transform:scale(.75);} 40%{ opacity:.85; transform:scale(1.15);} }
      .ep-load-bar{ width:100%; height:8px; border-radius:999px; background: rgba(255,236,180,0.12); overflow:hidden; }
      .ep-load-bar span{ display:block; height:100%; width:6%; border-radius:999px; background: rgba(255,236,180,0.78); transition: width 160ms ease; }
    `;
    (document.head || document.documentElement).appendChild(st);
  })();

  const epLoadFill = loadingOverlay.querySelector("#epLoadFill");
  function setLoadProgress(pct){
    try{
      const clamped = Math.max(0.06, Math.min(1, pct));
      epLoadFill && (epLoadFill.style.width = Math.round(clamped * 100) + "%");
    }catch(_){}
  }
  setLoadProgress(0.06);

  window.addEventListener("error", (e) => {
    try {
      loadingOverlay.style.display = "grid";
      const msg = (e && e.message) ? String(e.message) : "unknown";
      const esc = (s) => s.replace(/[&<>]/g, (c) => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));
      loadingOverlay.innerHTML = `<div style="padding:18px 20px; text-align:center;">ERROR: ${esc(msg)}</div>`;
      setLoadProgress(1);
    } catch (_) {}
  });

  const ctx = canvas.getContext("2d", { alpha: true });

  const hud = document.createElement("div");
  hud.style.cssText = `
    position: absolute;
    left: 14px;
    bottom: 14px;
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    color: rgba(255,255,255,0.85);
    font-size: 12px;
    line-height: 1.35;
    background: rgba(0,0,0,0.35);
    border: 1px solid rgba(255,255,255,0.12);
    padding: 10px 12px;
    border-radius: 10px;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    user-select: none;
    z-index: 2147480100;
    pointer-events: none;
  `;
  hud.innerHTML = `<b>Controls</b><br>Enrico: ← / →`;
  mount.appendChild(hud);

  // ==========================
  // Story UI
  // ==========================
  const storyWrap = document.createElement("div");
  storyWrap.style.cssText = `
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    top: 18px;
    max-width: min(560px, calc(100vw - 36px));
    color: rgba(255, 236, 180, 0.92);
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
    font-size: 14px;
    line-height: 1.55;
    letter-spacing: 0.2px;
    text-shadow: 0 1px 0 rgba(0,0,0,0.55);
    z-index: 2147480200;
    pointer-events: none;
    opacity: 0;
    transition: opacity 300ms ease;
  `;

  const storyBox = document.createElement("div");
  storyBox.style.cssText = `
    background: linear-gradient(180deg, rgba(0,0,0,0.46), rgba(0,0,0,0.30));
    border: 1px solid rgba(255, 236, 180, 0.18);
    box-shadow: 0 10px 28px rgba(0,0,0,0.35);
    border-radius: 14px;
    padding: 14px 16px;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
  `;

  const storyPre = document.createElement("pre");
  storyPre.style.cssText = `
    margin: 0;
    white-space: pre-wrap;
  `;
  storyPre.textContent = "";
  storyBox.appendChild(storyPre);
  storyWrap.appendChild(storyBox);
  mount.appendChild(storyWrap);

  // ==========================
  // Bottom navigation (clickable)
  // ==========================
  const navHints = document.createElement("div");
  navHints.style.cssText = `
    position: fixed;
    left: 0;
    right: 0;
    bottom: 56px;
    display: flex;
    justify-content: center;
    gap: 14px;
    z-index: 2147480200;
    pointer-events: auto;
    user-select: none;
    opacity: 0;
    transition: opacity 300ms ease;
  `;

  const mkHint = (txt) => {
    const d = document.createElement("button");
    d.type = "button";
    d.style.cssText = `
      padding: 8px 12px;
      border-radius: 999px;
      background: rgba(0,0,0,0.38);
      border: 1px solid rgba(255,255,255,0.14);
      color: rgba(255,255,255,0.86);
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 12px;
      letter-spacing: 0.3px;

      backdrop-filter: blur(6px);
      -webkit-backdrop-filter: blur(6px);

      cursor: pointer;
      pointer-events: auto;

      /* Safari hardening */
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
    `;
    d.textContent = txt;
    return d;
  };

  const hintLeft = mkHint("Previous");
  const hintRight = mkHint("Next");
  navHints.appendChild(hintLeft);
  navHints.appendChild(hintRight);
  mount.appendChild(navHints);

  // ==========================
  // Resize
  // ==========================
  function getViewportSize() {
    const vv = window.visualViewport;
    if (vv) return { w: Math.floor(vv.width), h: Math.floor(vv.height) };
    return { w: window.innerWidth, h: window.innerHeight };
  }

  function resize() {
    const { w, h } = getViewportSize();
    const dpr = Math.max(1, Math.min(2, window.devicePixelRatio || 1));
    canvas.width = Math.floor(w * dpr);
    canvas.height = Math.floor(h * dpr);
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }
  window.addEventListener("resize", resize, { passive: true });
  window.visualViewport && window.visualViewport.addEventListener("resize", resize, { passive: true });
  resize();

  // ==========================
  // Loading
  // ==========================
  function loadImage(url) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      img.crossOrigin = "anonymous";
      img.decoding = "async";
      img.onload = async () => {
        try { if (img.decode) await img.decode().catch(() => {}); } catch (_) {}
        resolve(img);
      };
      img.onerror = () => reject(new Error("Failed to load image: " + url));
      img.src = url;
    });
  }
  function scheduleIdle(fn){
    if ("requestIdleCallback" in window) {
      requestIdleCallback(fn, { timeout: 1200 });
    } else {
      setTimeout(fn, 350);
    }
  }



  async function loadAll() {
    const assets = {
      enrico: { idle: null, walk: [] },
      screens: ASSETS.screens.map(s => ({ id: s.id, url: s.url, img: null, bgInfo: null, _loading: null })),
      enricoReadyAt: null
    };

    // ---- Critical loading strategy ----
    // 1) Load first 2 backgrounds (so transitions feel immediate)
    // 2) Load Enrico idle + walk frames ASAP (so we can start the experience quickly)
    // 3) Stream remaining backgrounds in idle time (doesn't block interactivity)
    const PRELOAD_SCREENS = 2;

    // Progress accounting (keeps the bar moving)
    const criticalTotal = Math.max(1, Math.min(PRELOAD_SCREENS, assets.screens.length)) + 1 + ASSETS.enrico.walk.length;
    let criticalDone = 0;
    const bump = () => {
      criticalDone++;
      setLoadProgress(criticalDone / criticalTotal);
    };

    function ensureScreen(i) {
      const s = assets.screens[i];
      if (!s) return Promise.resolve(null);
      if (s.img) return Promise.resolve(s.img);
      if (s._loading) return s._loading;

      s._loading = loadImage(s.url)
        .then(img => {
          s.img = img;
          s.bgInfo = analyzeBg(img);
          return img;
        })
        .catch(e => { console.warn(e); return null; })
        .finally(() => { s._loading = null; });

      return s._loading;
    }

    // Load first screen immediately (also sets mount background)
    try {
      const first = assets.screens[0];
      const img0 = await ensureScreen(0);
      if (img0) {
        try { mount.style.backgroundImage = `url('${first.url}')`; } catch(_) {}
      }
      bump(); // screen 0
    } catch (e) {
      console.warn(e);
      bump();
    }

    // Preload screen 1 in parallel (if it exists)
    const preloadScreen1 = (PRELOAD_SCREENS >= 2 && assets.screens[1])
      ? ensureScreen(1).then(() => bump()).catch(() => bump())
      : Promise.resolve();

    // Load Enrico ASAP (parallel), so we can start as soon as he’s ready
    const loadEnrico = (async () => {
      try {
        assets.enrico.idle = await loadImage(ASSETS.enrico.idle); bump(); // idle
        const walkUrls = ASSETS.enrico.walk.slice();
        const walkImgs = new Array(walkUrls.length);
        let nextIdx = 0;
        const workers = Array.from({ length: Math.min(4, walkUrls.length) }, async () => {
          while (nextIdx < walkUrls.length) {
            const i = nextIdx++;
            walkImgs[i] = await loadImage(walkUrls[i]);
            bump();
          }
        });
        await Promise.all(workers);
        assets.enrico.walk = walkImgs;
        assets.enricoReadyAt = performance.now();
      } catch (e) { console.warn(e); }
    })();

    // Wait only for the “critical” set (screen0 already done; screen1 + Enrico now)
    await Promise.all([preloadScreen1, loadEnrico]);

    // Stream remaining screens in the background (idle time)
    (function streamRemainingScreens(){
      const startAt = Math.min(PRELOAD_SCREENS, assets.screens.length);
      let i = startAt;

      const pump = () => {
        if (i >= assets.screens.length) return;

        // Load one at a time to avoid pegging CPU/network
        ensureScreen(i).finally(() => {
          i++;
          scheduleIdle(pump);
        });
      };

      scheduleIdle(pump);
    })();

    return assets;
  }

  // ==========================
  // Input (desktop)
  // ==========================
  const keys = { left:false, right:false };

  window.addEventListener("keydown", (e) => {
    const k = e.key;
    if (k === "ArrowLeft") keys.left = true;
    if (k === "ArrowRight") keys.right = true;
  });

  window.addEventListener("keyup", (e) => {
    const k = e.key;
    if (k === "ArrowLeft") keys.left = false;
    if (k === "ArrowRight") keys.right = false;
  });

  // ==========================
  // Rendering helpers
  // ==========================
  function analyzeBg(img) {
    return { blackBandStartY: img.height * 0.853 };
  }

  function drawBgAndGetFloorY(img, vw, vh, bgInfo) {
    const iw = img.width, ih = img.height;
    const scale = Math.max(vw / iw, vh / ih);
    const dw = iw * scale;
    const dh = ih * scale;

    const dx = (vw - dw) * 0.5;
    const dyCenter = (vh - dh) * 0.5;

    const floorSrcY = (bgInfo && typeof bgInfo.blackBandStartY === "number") ? bgInfo.blackBandStartY : ih;
    const desiredDy = vh - (floorSrcY * scale);

    const dyMin = vh - dh;
    const dyMax = 0;
    const dy = Math.min(dyMax, Math.max(dyMin, desiredDy, dyCenter));

    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(img, dx, dy, dw, dh);

    const floorY = dy + (floorSrcY * scale);
    return { floorY };
  }

  function drawPlayer(img, x, baseGroundY, dir, viewportH, opts = {}) {
    const heightFactor = (typeof opts.heightFactor === "number") ? opts.heightFactor : 0.348;
    const pxMin = (typeof opts.minH === "number") ? opts.minH : 156;
    const pxMax = (typeof opts.maxH === "number") ? opts.maxH : 216;

    const targetH = Math.min(pxMax, Math.max(pxMin, viewportH * heightFactor));
    const scale = targetH / img.height;
    const drawW = img.width * scale;
    const drawH = img.height * scale;

    ctx.save();
    ctx.translate(x, baseGroundY);
    ctx.scale(dir, 1);
    ctx.drawImage(img, -drawW * 0.45, -drawH, drawW, drawH);
    ctx.restore();
  }

  // ==========================
  // World state
  // ==========================
  const mod = (n, m) => ((n % m) + m) % m;

  const state = {
    screenIndex: 0,
    lastScreenIndex: -1,
    storyStarted: false,
    enricoReady: false, // updated in render loop
    autoWalk: { active: false, dir: 1, phase: "idle", settleX: null },
    enrico: { x: 200, dir: 1, speed: 260, walkIdx: 0, walkT: 0 },
  };

  // Tuning
  const margin = 12;
  const LANDING_INSET = 84;     // final stop position inside the new screen
  const ENRICO_FOOT_LIFT = 115;
  let last = performance.now();

  function redirectToAbout() {
    window.location.href = ABOUT_URL;
  }

  function startAutoWalk(dir) {
    // If on last screen and user clicks "Back to about" (right), we redirect instead.
    const lastIdx = ASSETS.screens.length - 1;
    if (dir > 0 && state.screenIndex === lastIdx) { redirectToAbout(); return; }

    state.autoWalk.active = true;
    state.autoWalk.dir = dir;
    state.autoWalk.phase = "toEdge";
    state.autoWalk.settleX = null;
    state.enrico.dir = dir;
  }

  function stopAutoWalk() {
    state.autoWalk.active = false;
    state.autoWalk.phase = "idle";
    state.autoWalk.settleX = null;
  }

  // =========================================================
  // SOLID INPUT MODEL (Safari-proof)
  // - Use ONE pointerdown handler (capture) so it always fires.
  // - Rule:
  //   * If Enrico is auto-walking and user clicks ANYWHERE
  //     (including the SAME button): STOP. (No accidental restart)
  //   * If not auto-walking and user clicks Previous/Next: START.
  // =========================================================
  function isInside(el, target) {
    return target === el || (target && el && el.contains && el.contains(target));
  }

  document.addEventListener("pointerdown", (e) => {
    // Only react if the experience is mounted
    if (!mount.isConnected) return;

    const t = e.target;

    const onPrev = isInside(hintLeft, t);
    const onNext = isInside(hintRight, t);

    // Stop autopilot on ANY click (including clicking the buttons)
    if (state.autoWalk.active) {
      stopAutoWalk();
      // Prevent the same interaction from also triggering any Squarespace handlers
      // (and avoid focus weirdness on Safari)
      if (onPrev || onNext) {
        e.preventDefault();
        e.stopPropagation();
      }
      return;
    }

    // If not ready yet, ignore navigation clicks
    if (!state.enricoReady) return;

    // Start only when clicking the buttons
    if (onPrev) {
      e.preventDefault();
      e.stopPropagation();
      startAutoWalk(-1);
      return;
    }

    if (onNext) {
      e.preventDefault();
      e.stopPropagation();
      startAutoWalk(+1);
      return;
    }
  }, { capture: true });

  // Safety: if tab loses focus, stop autopilot + clear keys
  window.addEventListener("blur", () => {
    keys.left = false;
    keys.right = false;
    stopAutoWalk();
  });

  function step(assets) {
    if (!mount.isConnected) return;

    const now = performance.now();
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    const { w, h } = getViewportSize();
    ctx.clearRect(0, 0, w, h);

    const lastIdx = assets.screens.length - 1;

    // Background + derived floor (progressive load)
    const screen = assets.screens[state.screenIndex];

    // We always keep the CSS background on the mount (so the user sees *something*).
    // The canvas background draw is optional; if the image isn't ready yet, we use a stable fallback ground.
    let groundY = state._lastGroundY || Math.round(h * 0.86);

    if (screen && screen.img) {
      const bg = drawBgAndGetFloorY(screen.img, w, h, screen.bgInfo);
      groundY = Math.round(bg.floorY);
      state._lastGroundY = groundY;
    }
    const enricoReady = !!(assets.enrico && assets.enrico.idle && assets.enrico.walk && assets.enrico.walk.length);
    state.enricoReady = enricoReady;

    // Hints visibility
    if (enricoReady) {
      navHints.style.opacity = "1";
      navHints.style.pointerEvents = "auto";
    } else {
      navHints.style.opacity = "0";
      navHints.style.pointerEvents = "none";
    }

    // First screen: hide left button (no wrap)
    if (state.screenIndex === 0) {
      hintLeft.style.display = "none";
    } else {
      hintLeft.style.display = "inline-block";
    }

    // Last screen: right button becomes Back to about
    if (state.screenIndex === lastIdx) {
      hintRight.textContent = "Back to about";
    } else {
      hintRight.textContent = "Next";
    }

    // Story visibility + typing
    storyWrap.style.opacity = enricoReady ? "1" : "0";

    const screenId = screen.id || screen.url;
    if (enricoReady && !state.storyStarted) {
      state.storyStarted = true;
      state.lastScreenIndex = state.screenIndex;
      startTypingForScreen(screenId);
    } else if (state.storyStarted && state.lastScreenIndex !== state.screenIndex) {
      state.lastScreenIndex = state.screenIndex;
      startTypingForScreen(screenId);
    }

    // --------------------------
    // Enrico movement (Arrows + click)
    // --------------------------
    let enricoMoving = false;
    let enricoDir = state.enrico.dir;

    const manualIntent = (keys.left || keys.right);

    // Manual input overrides autopilot immediately
    if (manualIntent && state.autoWalk.active) {
      stopAutoWalk();
    }

    if (state.autoWalk.active) {
      enricoDir = state.autoWalk.dir;
      enricoMoving = true;
    } else {
      if (keys.left && !keys.right) { enricoDir = -1; enricoMoving = true; }
      if (keys.right && !keys.left) { enricoDir = 1; enricoMoving = true; }
    }
    state.enrico.dir = enricoDir;

    if (enricoMoving) {
      state.enrico.x += enricoDir * state.enrico.speed * dt;

      state.enrico.walkT += dt;
      if (assets.enrico.walk && assets.enrico.walk.length) {
        const fps = 14;
        const frameDur = 1 / fps;
        while (state.enrico.walkT >= frameDur) {
          state.enrico.walkT -= frameDur;
          state.enrico.walkIdx = (state.enrico.walkIdx + 1) % assets.enrico.walk.length;
        }
      }
    } else {
      state.enrico.walkIdx = 0;
      state.enrico.walkT = 0;
    }

    // --------------------------
    // Screen transition logic
    // - Autopilot: walk OUT, switch, walk IN to LANDING_INSET then stop
    // - Manual arrows:
    //    * right past last => redirect to about
    // --------------------------
    if (state.enrico.x > (w + margin)) {
      // If on last screen and moving right -> redirect
      if (state.screenIndex === lastIdx) {
        redirectToAbout();
        return;
      }

      // move to next screen
      state.screenIndex = mod(state.screenIndex + 1, assets.screens.length);
      try { mount.style.backgroundImage = `url('${assets.screens[state.screenIndex].url}')`; } catch(_) {}

      if (state.autoWalk.active) {
        // continue across: re-enter from left and stop at LANDING_INSET
        state.enrico.x = -margin;
        state.autoWalk.phase = "intoScreen";
        state.autoWalk.settleX = LANDING_INSET;
      } else {
        // manual: still continuous (less jarring)
        state.enrico.x = -margin;
      }
    } else if (state.enrico.x < (-margin)) {
      if (state.screenIndex === 0) {
        state.enrico.x = -margin; // clamp, don't wrap
        stopAutoWalk();
      } else {
        state.screenIndex = mod(state.screenIndex - 1, assets.screens.length);
        try { mount.style.backgroundImage = `url('${assets.screens[state.screenIndex].url}')`; } catch(_) {}

        if (state.autoWalk.active) {
          // continue across: re-enter from right and stop near right inset
          state.enrico.x = w + margin;
          state.autoWalk.phase = "intoScreen";
          state.autoWalk.settleX = (w - LANDING_INSET);
        } else {
          state.enrico.x = w + margin;
        }
      }
    }

    // If autopilot is in "intoScreen" phase, stop when he reaches settleX
    if (state.autoWalk.active && state.autoWalk.phase === "intoScreen" && typeof state.autoWalk.settleX === "number") {
      const target = state.autoWalk.settleX;
      if (state.autoWalk.dir > 0) {
        if (state.enrico.x >= target) stopAutoWalk();
      } else {
        if (state.enrico.x <= target) stopAutoWalk();
      }
    }

    // --------------------------
    // Draw Enrico + loading logic
    // --------------------------
    const y = (groundY - ENRICO_FOOT_LIFT);

    if (enricoReady) {
      try {
        if (loadingOverlay && loadingOverlay.parentNode) {
          loadingOverlay.style.display = "none";
          loadingOverlay.remove();
        }
      } catch (_) {}
    }

    if (!enricoReady) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.translate(state.enrico.x, y);
      const phH = Math.round(h * 0.28);
      const phW = Math.round(phH * 0.22);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fillRect(-phW/2, -phH, phW, phH);
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      for (let yy = -phH; yy < 0; yy += 4) ctx.fillRect(-phW/2, yy, phW, 1);
      ctx.restore();
      requestAnimationFrame(() => step(assets));
      return;
    }

    const img = enricoMoving ? assets.enrico.walk[state.enrico.walkIdx] : assets.enrico.idle;

    let t = 1;
    if (assets.enricoReadyAt) t = Math.min(1, (performance.now() - assets.enricoReadyAt) / 1200);

    ctx.save();
    ctx.globalAlpha = 0.15 + 0.85 * t;

    const jitter = (1 - t) * 1.8;
    const jx = (Math.random() - 0.5) * jitter;

    drawPlayer(img, state.enrico.x + jx, y, state.enrico.dir, h, { heightFactor: 0.348 });

    if (t < 1) {
      ctx.globalAlpha = 0.22 * (1 - t);
      ctx.fillStyle = "rgba(255,255,255,0.25)";
      const top = Math.max(0, y - Math.round(h * 0.40));
      const bot = Math.min(h, y + 10);
      for (let yy = top; yy < bot; yy += 3) ctx.fillRect(0, yy, w, 1);
    }

    ctx.restore();

    requestAnimationFrame(() => step(assets));
  }

  loadAll()
    .then((assets) => {
      const vw = getViewportSize().w;
      state.screenIndex = 0;
      state.enrico.x = Math.round(vw * 0.25);
      requestAnimationFrame(() => step(assets));
    })
    .catch((err) => {
      const { w, h } = getViewportSize();
      ctx.clearRect(0,0,w,h);
      ctx.fillStyle = "white";
      ctx.font = "16px ui-monospace, monospace";
      ctx.fillText("Asset load failed. Open console for details.", 20, 40);
      console.error(err);
    });

})();

</script>

  // ============================================================

  function loadImage(url) {

      img.crossOrigin = "anonymous";
      img.decoding = "async";
      img.onload = async () => {

  async function loadWithConcurrency(urls, concurrency, onProgress) {
    const results = new Array(urls.length);
    let i = 0, done = 0;

    async function worker() {
      while (i < urls.length) {
        const idx = i++;
        try { results[idx] = await loadImage(urls[idx]); } catch (_) { results[idx] = null; }
        done++;
        if (onProgress) onProgress(done, urls.length);
      }
    }

    const workers = [];
    for (let k = 0; k < Math.max(1, concurrency); k++) workers.push(worker());
    await Promise.all(workers);
    return results;

  const state = {
    screenIndex: 0,
    lastScreenIndex: -1,
    storyStarted: false,
    enrico: { x: 0, dir: 1, walkIdx: 0, walkT: 0, targetX: null },
    autoWalk: { active: false, dir: 1, phase: "idle" } // idle -> exit -> enter
  };

  const mod = (n, m) => ((n % m) + m) % m;

  function startAutoWalk(dir) {
    const lastIndex = ASSETS.screens.length - 1;

    if (dir > 0 && state.screenIndex === lastIndex) {
      cleanupAndGoAbout();
      return;
    }
    if (dir < 0 && state.screenIndex === 0) return;

    const { w } = getViewportSize();
    const homeX = Math.round(w * ENRICO_HOME_X_RATIO);

    state.autoWalk.active = true;
    state.autoWalk.dir = dir;
    state.autoWalk.phase = "exit";

    state.enrico.dir = dir;
    state.enrico.x = homeX;
    state.enrico.targetX = (dir > 0) ? (w - EDGE_INSET) : (EDGE_INSET);

    // Preload the destination background ASAP (so no hitch)
    const nextIdx = mod(state.screenIndex + dir, assets.screens.length);
    preloadScreen(nextIdx);
  }

  function stopAutoWalk() {
    state.autoWalk.active = false;
    state.autoWalk.phase = "idle";
    state.enrico.targetX = null;
  }

  prevBtn.addEventListener("click", () => startAutoWalk(-1));
  nextBtn.addEventListener("click", () => startAutoWalk(+1));

  // ============================================================
  // 7) DRAW / LOOP (optimized: background updates only on change)
  // ============================================================
  let last = performance.now();
  let lastBgIndex = -1;

  function drawPlayer(img, x, groundY, dir, viewportH) {
    const heightFactor = 0.285, minH = 120, maxH = 160;
    const targetH = Math.min(maxH, Math.max(minH, viewportH * heightFactor));
    const scale = targetH / img.height;
    const drawW = img.width * scale;
    const drawH = img.height * scale;

    ctx.save();
    ctx.translate(x, groundY);
    ctx.scale(dir, 1);
    ctx.drawImage(img, -drawW * 0.45, -drawH, drawW, drawH);
    ctx.restore();
  }

  function step() {
    if (!mount.isConnected) return;

    const now = performance.now();
    const dt = Math.min(0.033, (now - last) / 1000);
    last = now;

    const { w, h } = getViewportSize();
    ctx.clearRect(0, 0, w, h);

    const homeX = Math.round(w * ENRICO_HOME_X_RATIO);
    const lastIndex = assets.screens.length - 1;

    nextBtn.textContent = (state.screenIndex === lastIndex) ? "Back to About" : "Next";

    if (!state.autoWalk.active && (!state.enrico.x || state.enrico.x === 0)) {
      state.enrico.x = homeX;
    }

    const screen = assets.screens[state.screenIndex];
    if (!screen) { requestAnimationFrame(step); return; }

    // Only set background when screen changes (big perf win)
    if (lastBgIndex !== state.screenIndex) {
      lastBgIndex = state.screenIndex;
      mount.style.backgroundImage = `url('${screen.url}')`;

      // Preload the next background in advance
      preloadScreen(mod(state.screenIndex + 1, assets.screens.length));
      preloadScreen(mod(state.screenIndex - 1, assets.screens.length));
    }

    const groundY = Math.round(h * 0.82);
    const y = groundY - ENRICO_FOOT_LIFT;

    const enricoReady = !!(assets.enrico.idle && assets.enrico.walk && assets.enrico.walk.length);

    // Bubble visibility + loader
    if (enricoReady) {
      storyWrap.style.opacity = "1";
    } else {
      storyWrap.style.opacity = "0";
    }

    prevBtn.style.opacity = (state.screenIndex === 0) ? "0.35" : "1";
    prevBtn.style.pointerEvents = (state.screenIndex === 0) ? "none" : "auto";

    const screenId = screen.id || screen.url;
    if (enricoReady && !state.storyStarted) {
      state.storyStarted = true;
      state.lastScreenIndex = state.screenIndex;
      startTypingForScreen(screenId);
    } else if (state.storyStarted && state.lastScreenIndex !== state.screenIndex) {
      state.lastScreenIndex = state.screenIndex;
      startTypingForScreen(screenId);
    }

    const walking = state.autoWalk.active;
    storyWrap.style.opacity = enricoReady ? (walking ? "0.82" : "1") : "0";

    if (walking && enricoReady) {
      state.enrico.walkT += dt;
      const fps = 14, frameDur = 1 / fps;
      while (state.enrico.walkT >= frameDur) {
        state.enrico.walkT -= frameDur;
        state.enrico.walkIdx = (state.enrico.walkIdx + 1) % assets.enrico.walk.length;
      }

      const dir = state.autoWalk.dir;

      if (state.autoWalk.phase === "exit") {
        state.enrico.x += dir * WALK_SPEED * dt;

        const targetX = state.enrico.targetX;
        const reached = (dir > 0) ? (state.enrico.x >= targetX) : (state.enrico.x <= targetX);

        if (reached) {
          state.screenIndex = mod(state.screenIndex + dir, assets.screens.length);

          // walk in from opposite side
          state.enrico.x = (dir > 0) ? (-EDGE_INSET) : (w + EDGE_INSET);
          state.enrico.targetX = homeX;
          state.autoWalk.phase = "enter";
        }
      } else if (state.autoWalk.phase === "enter") {
        state.enrico.x += dir * WALK_SPEED * dt;
        const reachedHome = (dir > 0) ? (state.enrico.x >= homeX) : (state.enrico.x <= homeX);
        if (reachedHome) {
          state.enrico.x = homeX;
          stopAutoWalk();
        }
      }
    } else {
      state.enrico.walkIdx = 0;
      state.enrico.walkT = 0;
    }

    // Draw Enrico
    if (!enricoReady) {
      ctx.save();
      ctx.globalAlpha = 0.22;
      ctx.translate(state.enrico.x || homeX, y);
      const phH = Math.round(h * 0.22);
      const phW = Math.round(phH * 0.22);
      ctx.fillStyle = "rgba(255,255,255,0.35)";
      ctx.fillRect(-phW / 2, -phH, phW, phH);
      ctx.fillStyle = "rgba(0,0,0,0.35)";
      for (let yy = -phH; yy < 0; yy += 4) ctx.fillRect(-phW / 2, yy, phW, 1);
      ctx.restore();
    } else {
      const img = walking ? assets.enrico.walk[state.enrico.walkIdx] : assets.enrico.idle;
      drawPlayer(img, state.enrico.x || homeX, y, state.enrico.dir, h);
    }

    requestAnimationFrame(step);
  }

  // ============================================================
  // 8) START: load critical assets first, then stream the rest
  // ============================================================
  resize();

  (async () => {
    // Critical list:
    const critical = [
      ASSETS.screens[0].url,
      ...(ASSETS.screens.slice(1, CRITICAL_BG_COUNT).map(s => s.url)),
      ASSETS.enrico.idle,
      ...ASSETS.enrico.walk.slice(0, CRITICAL_WALK_FRAMES),
    ];

    // Dedup
    const criticalDedup = [...new Set(critical)];

    // Load critical with small concurrency for stability on mobile
    let loadedCount = 0;
    await loadWithConcurrency(criticalDedup, 2, (done, total) => {
      loadedCount = done;
      setProgress(Math.round((done / total) * 100));
    });

    // Assign what we loaded to assets (best effort)
    // (We can’t perfectly map results if any failed; we re-check via loadImage as needed)
    try {
      // Ensure bg0 is definitely warm
      preloadScreen(0);
      // bg1 warm if exists
      if (CRITICAL_BG_COUNT > 1) preloadScreen(1);
    } catch (_) {}

    // Load Enrico idle + the critical walk frames (again, mapping safely)
    try { assets.enrico.idle = await loadImage(ASSETS.enrico.idle); } catch (_) {}
    const criticalWalk = [];
    for (const u of ASSETS.enrico.walk.slice(0, CRITICAL_WALK_FRAMES)) {
      try { criticalWalk.push(await loadImage(u)); } catch (_) {}
    }
    assets.enrico.walk = criticalWalk.length ? criticalWalk : [];

    // Start loop immediately once Enrico is usable
    requestAnimationFrame(step);

    // Hide loader once we can render Enrico
    if (assets.enrico.idle && assets.enrico.walk.length) hideLoader();

    // Stream the rest in idle time
    idle(async () => {
      // Remaining walk frames
      const remainingWalk = ASSETS.enrico.walk.slice(CRITICAL_WALK_FRAMES);

      // Preload remaining bgs (not blocking)
      for (let i = CRITICAL_BG_COUNT; i < assets.screens.length; i++) preloadScreen(i);

      // Load remaining walk frames with concurrency in the background
      const restImgs = await loadWithConcurrency(remainingWalk, 2);
      const ok = restImgs.filter(Boolean);
      if (ok.length) assets.enrico.walk = assets.enrico.walk.concat(ok);

      // If loader was still up for some reason, kill it once full walk is ready
      if (loadingOverlay.isConnected && assets.enrico.idle && assets.enrico.walk.length >= 6) {
        hideLoader();
      }
    });
  })().catch(() => {
    // If something fails, still try to run the loop (background CSS fetch may succeed)
    requestAnimationFrame(step);
  });
})();

</script>

</body>
</html>
