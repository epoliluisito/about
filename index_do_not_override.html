<style>
  :root{
    --bg:#000;
    --fg:#eef1f7;
    --muted:#b4bccb;

    /* navigation */
    --nav: hsl(0 0% 65%);
    --nav-active: #fff;
    --hdr-pad-top: 27.5px;
    --hdr-pad-x: 24px;
    --nav-size: 8.8px;
    --nav-track: 1.11px;
    --nav-gap: 13px;
    --max: 1200px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;height:100%;overflow:hidden;background:var(--bg);color:var(--fg);
    font-family:"Avenir Next",Avenir,"Helvetica Neue",Helvetica,Arial,sans-serif}
  /* intro video overlay */
  .loading-video-overlay{
    position:fixed;inset:0;z-index:1;background:#000;
    display:flex;align-items:center;justify-content:center;
    opacity:1;visibility:visible;pointer-events:none;
    transition:opacity 2.5s ease;
  }
  .loading-video-overlay.fading-out{opacity:0;}
  .loading-video-overlay.hide{display:none;}
  .loading-video-overlay video{
    position:fixed;inset:0;width:100%;height:100%;
    object-fit:cover;display:block;filter:contrast(1.03);
  }

  /* liquid background */
  #liquid{
    position:fixed;inset:0;width:100vw;height:100vh;display:block;z-index:0;pointer-events:none;
    background:#000;
  }
  .ui-noise{
    position:fixed; inset:0; pointer-events:none; z-index:1;
    background:
      radial-gradient(1200px 800px at 50% 45%, rgba(255,255,255,.02), transparent 70%),
      radial-gradient(1400px 1000px at 50% 50%, transparent 55%, rgba(0,0,0,.22) 100%);
    opacity:.9;
  }

  /* intro text */
  .intro{
    position:absolute;left:50%;top:50%;
    transform:translate(-50%,-52%) translateY(-50px);
    z-index:2;width:min(920px,88vw);
    text-align:left;pointer-events:auto;
  }
  .intro-copy{
    display:grid;gap:12px;max-width:860px;margin:0 auto;
    text-align:left;justify-items:start;
    pointer-events:none;
  }


/* desktop: use a single fixed text block so typing only reveals content (no snapping/reflow) */
#introText{display:none; white-space:pre-wrap;}
@media (max-width: 860px){
  #introText{display:none;}
}
@media (min-width: 861px){
  .intro-copy{display:block; height:16em; overflow:hidden;}
  #introLine0,#introLine1,#introLine2{display:none;}
  #introText{display:block; margin:0; width:100%;}
}

.intro-line{
    margin:0;color:var(--fg);
    font-size:clamp(11px,.85vw,13px);
    font-weight:300;line-height:1.55;
    letter-spacing:.08em;text-transform:uppercase;
    min-height:1.55em;text-align:left;width:100%;
    /* force true horizontal text rendering (no vertical/rotated writing modes) */
    writing-mode: horizontal-tb;
    text-orientation: mixed;
    transform: none;
  }
  .intro-line.intro-lead-line{margin-bottom:12px;font-weight:500;}
  .caret{display:inline-block;width:8px;animation:blink 1s steps(1) infinite}
  @keyframes blink{50%{opacity:0}}

  /* header + menu */
  .site-header{
    position:fixed;
    inset:0 0 auto 0;
    z-index:9999;
    padding: var(--hdr-pad-top) calc(var(--hdr-pad-x) + env(safe-area-inset-right,0px)) 12px calc(var(--hdr-pad-x) + env(safe-area-inset-left,0px));
    background:transparent;
    pointer-events:auto;
  }
  .hdr-container{max-width:var(--max);margin:0 auto}
  .site-header__row{display:flex;justify-content:flex-end;align-items:flex-start}
  .nav{display:flex;align-items:center;gap:var(--nav-gap)}
  .nav a{
    font-family:"Futura PT","futura-pt","Futura","Avenir Next","Avenir",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    font-weight:400;
    font-size:var(--nav-size);
    letter-spacing:var(--nav-track);
    text-transform:uppercase;
    line-height:1.6;
    color:var(--nav);
    text-decoration:none;
    white-space:nowrap;
    transition:color .18s ease;
  }
  .nav a:hover,.nav a.is-active{color:var(--nav-active)}

  .nav-toggle{
    display:none;
    font-family:"Futura PT","futura-pt","Futura","Avenir Next","Avenir",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    font-size:var(--nav-size);
    letter-spacing:var(--nav-track);
    text-transform:uppercase;
    color:var(--nav-active);
    border:1px solid rgba(255,255,255,.18);
    background:rgba(0,0,0,.25);
    padding:8px 10px;
    border-radius:999px;
    cursor:pointer;
    -webkit-tap-highlight-color:transparent;
  }
  .nav-state{position:fixed;left:-9999px;top:-9999px;opacity:0;pointer-events:none}
  .nav-backdrop{
    position:fixed;inset:0;background:rgba(0,0,0,.55);
    opacity:0;pointer-events:none;transition:opacity .18s ease;z-index:9998;
  }
  .nav-panel{
    position:fixed;top:0;right:0;height:100vh;width:min(320px,86vw);
    padding:72px 22px 22px;background:rgba(0,0,0,.92);backdrop-filter:blur(10px);
    transform:translateX(110%);transition:transform .22s ease;z-index:10000;
    border-left:1px solid rgba(255,255,255,.08);
  }
  .nav-panel a{
    display:block;padding:14px 0;border-bottom:1px solid rgba(255,255,255,.08);
    font-family:"Futura PT","futura-pt","Futura","Avenir Next","Avenir",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    font-size:12px;letter-spacing:var(--nav-track);text-transform:uppercase;
    color:var(--nav);text-decoration:none;
  }
  .nav-panel a.is-active{color:var(--nav-active)}
  .nav-panel__close{
    position:fixed;top:18px;right:18px;z-index:10001;
    border:1px solid rgba(255,255,255,.18);background:rgba(0,0,0,.25);color:#fff;
    padding:8px 10px;border-radius:999px;cursor:pointer;
    font-family:"Futura PT","futura-pt","Futura","Avenir Next","Avenir",system-ui,-apple-system,Segoe UI,Roboto,Helvetica,Arial;
    font-size:var(--nav-size);letter-spacing:var(--nav-track);text-transform:uppercase;
  }
  .nav-state:checked ~ .nav-backdrop{opacity:1;pointer-events:auto}
  .nav-state:checked ~ .nav-panel{transform:translateX(0)}

  /* Mobile menu behavior (mobile only) */
  @media (max-width: 860px){
    .nav{display:none;}
    .nav-toggle{display:inline-flex; align-items:center; justify-content:center;}
    /* mobile: keep original vertical centering */
    .intro{ transform: translate(-50%,-52%); }

    /* Mobile-only typography alignment overrides */
    .intro{ text-align:left; }
    .intro-copy{
      text-align:left;
      justify-items:start;
      margin-left:0;
      margin-right:0;
    }
    .intro-line{ text-align:left; }

    /* Mobile-only fixes */
    /* 1) Uniform weight for the whole typed text (including the lead line) */
    .intro-line{ font-weight:500; }
    .intro-line.intro-lead-line{ font-weight:500; }

    /* 2) Keep CTAs under the typed text (no overlap) */
    .cta-row{ position:static; top:0; margin-top:66px; justify-content:flex-start; }

    opacity: 0;
    transform: translateY(10px);
    transition: opacity .6s ease, transform .6s ease;
    pointer-events: none;
    z-index: 50;
  }
  .cta-row{
    /* Positioned under the main intro text (center screen area). */
    left:auto;
    bottom:auto;
    transform:none;

    display:flex;
    align-items:center;
    justify-content:center;
    gap: 12px;
    font-size: 10.5px;
    letter-spacing: .12em;
    text-transform: uppercase;

    opacity: 0;
    transform: translateY(10px);
    transition: opacity .6s ease, transform .6s ease;
    pointer-events: none;
    z-index: 50;
    position: relative;
    top: -40px;
}

  .cta-row.is-visible{
    opacity: 1;
    transform: translateY(0);
    pointer-events: auto;
  }

  .cta-link{
    color: #4ade80;
    text-decoration: none;
    border-bottom: none;
    padding-bottom: 0;
    }
  .cta-link:hover,
  .cta-link:focus-visible{
    color:#4ade80;
    outline: none;
  }
  .cta-dot{
    color: rgba(255,255,255,.85);
    transform: translateY(-0.5px);
  }
  .cta-arrow{
    margin-left: 4px;
    font-size: 12px;
    letter-spacing: 0;
  }

  
  .cta-link--disabled{opacity:.65;cursor:default;pointer-events:none;}

  /* Full-screen Bio overlay */
  .bio-overlay{
    position:fixed;
    inset:0;
    background: rgba(0,0,0,.82);
    opacity:0;
    pointer-events:none;
    transition: opacity .25s ease;
    z-index: 9999;
  }
  .bio-overlay.is-open{
    opacity:1;
    pointer-events:auto;
  }
  .bio-overlay__frame{
    width:100%;
    height:100%;
    border:0;
    background:#0b0b0b;
  }
  .bio-overlay__close{
    position:absolute;
    top:14px;
    right:14px;
    width:40px;
    height:40px;
    border:1px solid rgba(255,255,255,.35);
    border-radius: 0;
    background: rgba(0,0,0,.15);
    color:#fff;
    font-size:22px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    z-index: 10000;
  }
  .bio-overlay__close:hover{
    border-color: rgba(255,255,255,.6);
    background: rgba(0,0,0,.55);
  }


  /* Mobile-only: hide top-right bio overlay close (use in-bio close instead) */
  @media (max-width: 860px){
    .bio-overlay__close{display:none !important;}
  }

</style>

<script>
function typeSequence(){
  const leadLine = `I AM A NARRATIVE AND EXPERIENCE DESIGNER.`;
  const lines = [
    `I BUILD NARRATIVE AND CONCEPTUAL SYSTEMS THAT HELP ORGANIZATIONS UNDERSTAND COMPLEXITY, ANTICIPATE CHANGE, AND DESIGN COHERENT FUTURE DIRECTIONS.`,
    `MY PRACTICE LIVES WHERE STORY, STRATEGY, AND EMERGING TECHNOLOGIES CONVERGE. I WORK BY TRANSFORMING SCATTERED INFORMATION - DATA, SIGNALS, BEHAVIOURS, CONTRADICTIONS - INTO PATTERNS THAT REVEAL WHAT'S ACTUALLY HAPPENING BENEATH THE SURFACE.`
  ];

  const isDesktop = window.matchMedia("(min-width: 861px)").matches;

  const escapeHTML = (s)=> s
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#39;");

  function typeIntoHTML(el, txt, spd, done){
    let i = 0;
    el.innerHTML = '';
    const k = setInterval(()=>{
      i += 1;
      const vis = txt.slice(0,i);
      el.innerHTML = escapeHTML(vis).replace(/\n/g,'<br>') + '<span class="caret">▌</span>';
      if(i >= txt.length){
        clearInterval(k);
        el.innerHTML = escapeHTML(txt).replace(/\n/g,'<br>');
        setTimeout(()=> done && done(), 120);
      }
    }, spd);
  }

  // Desktop: one single fixed block (no multi-paragraph snapping).
  if(isDesktop){
    const el = document.getElementById('introText');
    const full = leadLine + "\n\n" + lines[0] + "\n\n" + lines[1];
    typeIntoHTML(el, full, 10, ()=>{
      document.body.classList.add('intro-done');
      document.dispatchEvent(new CustomEvent('intro:typingComplete'));
      try{ if(typeof window.__onIntroTypingComplete === 'function') window.__onIntroTypingComplete(); }catch(e){}
    });
    return;
  }

  // Mobile: keep the original 3-line flow.
  const leadEl = document.getElementById('introLine0');
  const els = [document.getElementById('introLine1'), document.getElementById('introLine2')];

  function typeInto(el, txt, spd, done){
    let i = 0;
    el.innerHTML = '';
    const k = setInterval(()=>{
      i += 1;
      el.innerHTML = txt.slice(0,i) + '<span class="caret">▌</span>';
      if(i >= txt.length){
        clearInterval(k);
        el.textContent = txt;
        setTimeout(()=> done && done(), 120);
      }
    }, spd);
  }

  typeInto(leadEl, leadLine, 18, ()=>{
    typeInto(els[0], lines[0], 12, ()=>{
      typeInto(els[1], lines[1], 8, ()=>{
        document.body.classList.add('intro-done');
        document.dispatchEvent(new CustomEvent('intro:typingComplete'));
      });
    });
  });

}
window.__startIntroTyping = typeSequence;
</script>
<script>
window.addEventListener('DOMContentLoaded', function(){
const overlay = document.getElementById('loadingVideoOverlay');
  const video = document.getElementById('loadingVideo');
  if(!overlay || !video) return;

  let hidden = false;

  function startIntroTypingOnce(){
    if(window.__introTypingStarted) return;
    window.__introTypingStarted = true;
    if (typeof window.__startIntroTyping === 'function') window.__startIntroTyping();
  }

  const INTRO_FADE_MS = 2500;
  let fadeArmed = false;

  function beginFadeOut(){
    if(hidden || fadeArmed) return;
    fadeArmed = true;
    // Start typing first, then begin fading a moment later so the text is already writing as the video fades.
    startIntroTypingOnce();
    const FADE_AFTER_TYPING_LEAD_MS = 120;
    setTimeout(()=>{
      if(hidden) return;
      overlay.classList.add('fading-out');
    }, FADE_AFTER_TYPING_LEAD_MS);
    setTimeout(()=>{
      if(hidden) return;
      hidden = true;
      overlay.remove();
    }, INTRO_FADE_MS + FADE_AFTER_TYPING_LEAD_MS + 40);
  }

  function hideOverlay(delayMs = 0){
    if(hidden) return;
    const doHide = ()=>{
      if(hidden) return;
      beginFadeOut();
    };
    if (delayMs > 0) setTimeout(doHide, delayMs);
    else doHide();
  }

  // Text starts just before the intro video fades, so both overlap visibly

  // Hide overlay when the video ends (fade is usually armed before this via metadata timing)
  video.addEventListener('ended', ()=>hideOverlay(0), { once:true });

  // Fallbacks
  video.addEventListener('error', ()=>{
    startIntroTypingOnce();
    setTimeout(hideOverlay, 200);
  });

  const playAttempt = video.play();
  if (playAttempt && typeof playAttempt.catch === 'function') {
    playAttempt.catch(()=>{
      // If autoplay fails, start text anyway and remove overlay soon
      startIntroTypingOnce();
      setTimeout(hideOverlay, 900);
    });
  }

  // If file is slow/unavailable, don't block text
  setTimeout(()=>{
    if (video.readyState < 2) {
      startIntroTypingOnce();
      hideOverlay();
    }
  }, 2200);

  // Hard safety: respect actual video duration when available, with a small tail for flicker/end frame
  const safetyTailMs = 900;
  function armDurationSafety(){
    if (!Number.isFinite(video.duration) || video.duration <= 0) return;
    const durationMs = Math.ceil(video.duration * 1000);
    const fadeStartMs = Math.max(0, durationMs - INTRO_FADE_MS);
    setTimeout(beginFadeOut, fadeStartMs);
    const totalMs = durationMs + safetyTailMs;
    setTimeout(()=>{
      startIntroTypingOnce();
      hideOverlay();
    }, totalMs);
  }
  if (video.readyState >= 1) armDurationSafety();
  else video.addEventListener('loadedmetadata', armDurationSafety, { once:true });

  // Absolute fallback only if metadata never arrives
  setTimeout(()=>{
    if (!hidden && video.readyState < 1) {
      startIntroTypingOnce();
      hideOverlay();
    }
  }, 15000);
});
</script>
<script>
(function(){
  const state = document.getElementById('navState');
  const toggle = document.getElementById('navToggle');
  const backdrop = document.querySelector('.nav-backdrop');
  const panel = document.querySelector('.nav-panel');

  if(!state || !toggle) return;

  function syncAria(){
    const open = !!state.checked;
    toggle.setAttribute('aria-expanded', open ? 'true' : 'false');
  }

  if(backdrop){
    backdrop.addEventListener('click', () => { state.checked = false; syncAria(); });
  }

  if(panel){
    panel.addEventListener('click', (e) => {
      const a = e.target && e.target.closest && e.target.closest('a');
      if(a){ state.checked = false; syncAria(); }
    });
  }

  document.addEventListener('keydown', (e) => {
    if(e.key === 'Escape' && state.checked){
      state.checked = false; syncAria();
    }
  });

  state.addEventListener('change', syncAria);
  syncAria();
})();
</script>
<script>
(function(){
  const ctas = document.getElementById('postTypeCtas');
  if(!ctas) return;

  function reveal(){
    ctas.classList.add('is-visible');
    ctas.setAttribute('aria-hidden','false');
  }

  document.addEventListener('intro:typingComplete', reveal, { once:true });

  // Fallback: if typing already finished for any reason.
  if(document.body.classList.contains('intro-done')) reveal();
})();
</script>




  <!-- BIO overlay -->
  <div class="bio-overlay" id="bioOverlay" aria-hidden="true" role="dialog" aria-label="Bio">
    <button class="bio-overlay__close" id="bioOverlayClose" aria-label="Close">×</button>
    <iframe class="bio-overlay__frame" id="bioOverlayFrame" title="Bio" loading="lazy"></iframe>
  </div>

<script>
window.addEventListener('DOMContentLoaded', function(){
  const trigger = document.getElementById('ctaBio');
  const overlay = document.getElementById('bioOverlay');
  const frame = document.getElementById('bioOverlayFrame');
  const closeBtn = document.getElementById('bioOverlayClose');
  if(!trigger || !overlay || !frame || !closeBtn) return;

  const BIO_URL = 'bio.html';

  function openOverlay(){
    frame.setAttribute('src', BIO_URL);
    overlay.classList.add('is-open');
    overlay.setAttribute('aria-hidden','false');
    document.body.style.overflow = 'hidden';
    closeBtn.focus();
  }

  function closeOverlay(){
    overlay.classList.remove('is-open');
    overlay.setAttribute('aria-hidden','true');
    document.body.style.overflow = '';
    // Stop the embedded experience and avoid accidental state persistence
    try{ frame.setAttribute('src',''); }catch(e){}
    try{ trigger && trigger.focus && trigger.focus(); }catch(e){}
  }

  // Allow the embedded bio (iframe) to request closing the overlay
  window.addEventListener('message', function(event){
    const data = event && event.data;
    if(!data || data.type !== 'CLOSE_BIO_OVERLAY') return;
    if(overlay.classList.contains('is-open')) closeOverlay();
  });

  trigger.addEventListener('click', function(e){
    e.preventDefault();
    openOverlay();
  });

  closeBtn.addEventListener('click', closeOverlay);

  overlay.addEventListener('click', function(e){
    if(e.target === overlay) closeOverlay();
  });

  document.addEventListener('keydown', function(e){
    if(e.key === 'Escape' && overlay.classList.contains('is-open')) closeOverlay();
  });
});
</script>
